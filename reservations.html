<!DOCTYPE html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Reservations</title>

				  <option value="4">4</option>

				  <option value="18">18</option>

				  <option value="21">21</option>
				  <option value="22">22</option>
				  <option value="23">23</option>
				  <option value="24">24</option>
				  <option value="25">25</option>
				  <option value="26">26</option>
				  <option value="27">27</option>
				  <option value="28">28</option>
				  <option value="29">29</option>
				  <option value="30">30</option>
				  <option value="31">31</option>				  
			    </select>
			    <select name="years">
			      <option value="2017">2017</option>
				  <option value="2018">2018</option>			  
			    </select>			  			  
			  </p>

			  <p>Pick-Up Time<br />
			    <select name="hours">
			      <option value="12">12</option>
				  <option value="1">1</option>
				  <option value="2">2</option>
				  <option value="3">3</option>
				  <option value="4">4</option>
				  <option value="5">5</option>
				  <option value="6">6</option>
				  <option value="7">7</option>
				  <option value="8">8</option>
				  <option value="9">9</option>
				  <option value="10">10</option>
				  <option value="11">11</option>				  				  
			    </select> : 
			    <select name="mins">
			      <option value="00">00</option>
				  <option value="15">15</option>
				  <option value="30">30</option>
				  <option value="45">45</option>				  
			    </select>
			    <select name="ampm">
			      <option value="am">AM</option>
				  <option value="pm">PM</option>			  
			    </select>			  			  
			  </p>			  

		  <p>
		    <label>Pick-Up Location</label><br />
			<input id="pickup" placeholder="Enter pick-up address" type="text"></input><br /> 	
		  </p>
		  <p>
		    <label>Drop-Off Location</label><br />
			<input id="dropoff" placeholder="Enter drop-off address" type="text"></input><br />
			
		  </p>
		  <p>Number of Passengers<br />
		  <select name="passengers">
			<option value="1">1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>			
		  </select>
		  <p>
		    <label>Telephone no#</label><br />
			<input type="text" name="phone" maxlength="20" /><br />
		  </p>		  
		  <p>
		    <label>Name</label><br />
			<input type="text" name="username" maxlength="30" /><br />
		  </p>
		  		  		  
		<input type="submit" id="submit" class="btn btn-primary btn-block" value="Calculate Fare" />
			  	
		</div><!-- end of div .col-6 -->
	  </div><!-- end of div .row -->
	  
	  <div class="row">
		<div class="col-12">
		  <h2 id="fare">Fare Details</h2>

		  <div id="directions-panel">
		  </div>
		  		  
		</div>	  	  
	  </div><!-- end of div .row -->
	  
	  <div class="row">
	    <div id="map-panel" class="col-12">
		
		  <h2>Map</h2>
			<div id="map">
			</div>
		  
		</div>	  
	  </div>
